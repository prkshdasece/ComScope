name: Release to Snap Store

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Add comprehensive permissions for all operations
    permissions:
      contents: write
      repository-projects: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        with:
          store_login: ${{ secrets.SNAPCRAFT_STORE_LOGIN }}
          snap: ${{ steps.build.outputs.snap }}
          release: stable
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ steps.build.outputs.snap }}
          draft: false
          prerelease: false
          generate_release_notes: true