name: Build Snap

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Build snap
        uses: snapcore/action-build@v1
        id: build
        
      - name: Upload snap artifact
        uses: actions/upload-artifact@v3
        with:
          name: comscope-snap
          path: ${{ steps.build.outputs.snap }}